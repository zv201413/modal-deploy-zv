name: Modal Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy with Modal
        run: |
          set -euo pipefail
          TOKEN_ID="${{ secrets.MODAL_TOKEN_ID }}"
          TOKEN_SECRET="${{ secrets.MODAL_TOKEN_SECRET }}"
          if [ -n "$TOKEN_ID" ] && [ -n "$TOKEN_SECRET" ]; then
            export MODAL_TOKEN_ID="$TOKEN_ID"
            export MODAL_TOKEN_SECRET="$TOKEN_SECRET"
          fi
          modal deploy main.py
