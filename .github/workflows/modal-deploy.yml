name: Modal Deploy

on:
  workflow_dispatch:
    inputs:
      modal_region:
        description: "运行区域（如 polandcentral、eu、us-east 等）。留空则使用 Modal 默认调度。"
        required: false
        default: ""
      modal_nonpreemptible:
        description: "启用非抢占模式（固定 IP，费用 3x）"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy with Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_REGION: ${{ inputs.modal_region }}
          MODAL_NONPREEMPTIBLE: ${{ inputs.modal_nonpreemptible }}
        run: |
          set -euo pipefail
          modal deploy main.py
